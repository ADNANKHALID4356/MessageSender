# =============================================================
# Deploy to VPS — MessageSender
#
# Triggers automatically after the CI/CD pipeline passes on the
# main branch, or can be triggered manually via workflow_dispatch.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST        — VPS IP address or hostname
#   VPS_USER        — SSH user on the VPS (e.g. "deploy")
#   VPS_SSH_KEY     — Private SSH key (paste full content of ~/.ssh/id_ed25519)
#
# Optional GitHub Secrets:
#   VPS_PORT        — SSH port (default: 22)
#   VPS_APP_DIR     — Application directory on VPS (default: /opt/messagesender)
# =============================================================

name: Deploy to VPS

on:
  # Automatically trigger after CI/CD pipeline succeeds on main
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

  # Allow manual deployment from the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"
      skip_build_check:
        description: "Skip CI build check (force deploy)"
        required: false
        type: boolean
        default: false
      deploy_timeout_minutes:
        description: "Deployment timeout in minutes (increase for first-time builds)"
        required: false
        default: "20"

env:
  APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/messagesender' }}

# Minimal permissions — this workflow only SSHs to a VPS; no GitHub API calls needed.
permissions: {}

jobs:
  # ─────────────────────────────────────────────────────────
  # Gate: only proceed if CI passed (skip for manual dispatch)
  # ─────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI Status
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check CI conclusion
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — skipping CI check"
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "CI passed — proceeding with deployment"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "CI did not pass (conclusion: ${{ github.event.workflow_run.conclusion }}) — skipping deployment"
          fi

  # ─────────────────────────────────────────────────────────
  # Deploy
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'
    environment:
      name: production
      url: ${{ secrets.FRONTEND_URL }}

    steps:
      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.VPS_HOST }}" ]]    && missing+=("VPS_HOST")
          [[ -z "${{ secrets.VPS_USER }}" ]]    && missing+=("VPS_USER")
          [[ -z "${{ secrets.VPS_SSH_KEY }}" ]] && missing+=("VPS_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo "   Add them at: Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ All required secrets present"

      # ── SSH into VPS and run deployment ──────────────────
      # timeout: SSH connection timeout (5m is generous for any VPS)
      # command_timeout: total script execution time.
      #   - Regular updates: ~5-10 min
      #   - First-time build (no cache): can take 15-25 min depending on VPS speed
      #   - Increase via workflow_dispatch › deploy_timeout_minutes for first deploys
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 5m
          command_timeout: ${{ github.event.inputs.deploy_timeout_minutes || '20' }}m
          script: |
            set -euo pipefail

            APP_DIR="${{ env.APP_DIR }}"
            BRANCH="${{ github.event.inputs.branch || 'main' }}"

            # Colours
            RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'
            BLUE='\033[0;34m'; NC='\033[0m'

            log()  { echo -e "${BLUE}[DEPLOY]${NC} $*"; }
            ok()   { echo -e "${GREEN}[OK]${NC}    $*"; }
            warn() { echo -e "${YELLOW}[WARN]${NC}  $*"; }
            fail() { echo -e "${RED}[FAIL]${NC}  $*"; exit 1; }

            log "=== MessageSender Deployment ==="
            log "App dir : ${APP_DIR}"
            log "Branch  : ${BRANCH}"
            log "Time    : $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # ── 1. Check prerequisites ──────────────────────
            log "[1/7] Checking prerequisites..."
            command -v docker  >/dev/null 2>&1 || fail "Docker not installed. Run: sudo bash scripts/vps-setup-ubuntu.sh"
            command -v git     >/dev/null 2>&1 || fail "git not installed"
            [[ -d "${APP_DIR}" ]] || fail "App directory ${APP_DIR} not found. Run vps-deploy.sh first."
            [[ -f "${APP_DIR}/.env.prod" ]] || fail ".env.prod not found in ${APP_DIR}. See docs/VPS_DEPLOYMENT.md"
            ok "Prerequisites OK"

            # ── 2. Pull latest code ─────────────────────────
            log "[2/7] Pulling latest code (branch: ${BRANCH})..."
            cd "${APP_DIR}"
            git fetch origin
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"
            COMMIT=$(git rev-parse --short HEAD)
            ok "Code updated to ${COMMIT}"

            # ── 3. Backup database before deploy ───────────
            log "[3/7] Backing up database..."
            if docker ps --filter name=messagesender_postgres --filter status=running -q | grep -q .; then
              BACKUP_DIR="${APP_DIR}/backups"
              mkdir -p "${BACKUP_DIR}"
              BACKUP_FILE="${BACKUP_DIR}/pre-deploy_${COMMIT}_$(date +%Y%m%d_%H%M%S).sql.gz"
              docker exec messagesender_postgres pg_dump -U messagesender messagesender_db | gzip > "${BACKUP_FILE}"
              ok "Database backed up: $(basename "${BACKUP_FILE}")"
            else
              warn "Database container not running — skipping backup (first deploy?)"
            fi

            # ── 4. Build images ─────────────────────────────
            log "[4/7] Building Docker images..."
            docker compose \
              -f "${APP_DIR}/docker-compose.yml" \
              -f "${APP_DIR}/docker-compose.prod.yml" \
              --env-file "${APP_DIR}/.env.prod" \
              build --pull
            ok "Images built"

            # ── 5. Start / restart services ─────────────────
            log "[5/7] Starting services..."
            docker compose \
              -f "${APP_DIR}/docker-compose.yml" \
              -f "${APP_DIR}/docker-compose.prod.yml" \
              --env-file "${APP_DIR}/.env.prod" \
              up -d --remove-orphans
            ok "Services started"

            # ── 6. Health checks (with retries) ────────────
            log "[6/7] Waiting for health checks..."
            MAX_RETRIES=12
            RETRY_DELAY=10

            api_healthy=false
            for i in $(seq 1 "${MAX_RETRIES}"); do
              if curl -fsS "http://127.0.0.1:4000/api/v1/health" >/dev/null 2>&1; then
                api_healthy=true
                ok "Backend healthy (attempt ${i}/${MAX_RETRIES})"
                break
              fi
              echo "  Waiting... attempt ${i}/${MAX_RETRIES} (retry in ${RETRY_DELAY}s)"
              sleep "${RETRY_DELAY}"
            done
            [[ "${api_healthy}" == "true" ]] || fail "Backend health check failed after $((MAX_RETRIES * RETRY_DELAY))s"

            frontend_healthy=false
            for i in $(seq 1 "${MAX_RETRIES}"); do
              if curl -fsS "http://127.0.0.1:3000" >/dev/null 2>&1; then
                frontend_healthy=true
                ok "Frontend healthy (attempt ${i}/${MAX_RETRIES})"
                break
              fi
              echo "  Waiting... attempt ${i}/${MAX_RETRIES} (retry in ${RETRY_DELAY}s)"
              sleep "${RETRY_DELAY}"
            done
            [[ "${frontend_healthy}" == "true" ]] || fail "Frontend health check failed after $((MAX_RETRIES * RETRY_DELAY))s"

            # ── 7. Summary ──────────────────────────────────
            log "[7/7] Deployment summary"
            docker compose \
              -f "${APP_DIR}/docker-compose.yml" \
              -f "${APP_DIR}/docker-compose.prod.yml" \
              --env-file "${APP_DIR}/.env.prod" \
              ps

            echo ""
            ok "=== Deployment complete ==="
            ok "Commit  : ${COMMIT}"
            ok "Backend : http://127.0.0.1:4000/api/v1/health"
            ok "Frontend: http://127.0.0.1:3000"

      # ── Post-deploy: clean up old Docker layers ──────────
      - name: Prune old Docker images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            docker image prune -f --filter "until=72h" || true
            echo "Docker image prune complete"

  # ─────────────────────────────────────────────────────────
  # Notify: deployment result
  # ─────────────────────────────────────────────────────────
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [check-ci, deploy]
    if: always() && needs.check-ci.outputs.should_deploy == 'true'
    steps:
      - name: Report deployment outcome
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ Deployment to VPS succeeded"
            echo "   Commit: ${{ github.sha }}"
            echo "   Triggered by: ${{ github.actor }}"
          else
            echo "❌ Deployment to VPS FAILED"
            echo "   Result: ${{ needs.deploy.result }}"
            echo "   Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
